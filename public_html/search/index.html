<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Search prints — myerman.art">
  <title>Search — myerman.art</title>
  <link rel="icon" type="image/x-icon" href="/images/favicon.ico">
  <link rel="icon" type="image/png" sizes="32x32" href="/images/favicon-32x32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="/images/favicon-16x16.png">
  <link rel="apple-touch-icon" href="/images/apple-touch-icon.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=Inter:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/style.css">
  <!-- Google tag (gtag.js) -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-E26FGHKTSF"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-E26FGHKTSF');
  </script>
  <style>
    .search-hero {
      padding: 3rem 0 2rem;
    }
    .search-hero h1 {
      font-size: clamp(1.75rem, 5vw, 2.5rem);
      margin: 0 0 1.5rem;
    }
    .search-input-wrap {
      position: relative;
      max-width: 560px;
    }
    .search-input {
      width: 100%;
      padding: 0.85rem 1.1rem;
      font-size: 1.1rem;
      font-family: inherit;
      background: var(--color-surface, #1a1a1a);
      border: 1px solid var(--color-border, #333);
      border-radius: 6px;
      color: var(--color-text, #f0f0f0);
      outline: none;
      box-sizing: border-box;
      transition: border-color 0.15s;
    }
    .search-input:focus {
      border-color: var(--color-accent, #c8a96e);
    }
    .search-input::placeholder {
      color: var(--color-muted, #666);
    }
    .search-clear {
      position: absolute;
      right: 0.75rem;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      color: var(--color-muted, #666);
      font-size: 1.25rem;
      cursor: pointer;
      padding: 0.25rem;
      line-height: 1;
      display: none;
    }
    .search-clear:hover { color: var(--color-text, #f0f0f0); }
    .search-meta {
      margin: 1.25rem 0 2rem;
      color: var(--color-muted, #888);
      font-size: 0.9rem;
      min-height: 1.4em;
    }
    .search-meta strong {
      color: var(--color-text, #f0f0f0);
    }
    .no-results {
      padding: 3rem 0;
      color: var(--color-muted, #888);
    }
    .no-results p { margin: 0 0 0.5rem; }
    .no-results a { color: var(--color-accent, #c8a96e); }
  </style>
</head>
<body>

  <nav class="site-nav" aria-label="Main navigation">
    <div class="container">
      <a href="/" class="nav-logo">myerman.art</a>
      <ul class="nav-links" role="list">
        <li><a href="/">Home</a></li>
        <li><a href="/prints/">Prints</a></li>
        <li><a href="/about/">About</a></li>
        <li><a href="/patreon/">Patreon</a></li>
        <li><a href="/search/">Search</a></li>
        <li><a href="/cart/" class="nav-cart">Cart <span class="cart-count" id="cart-count">0</span></a></li>
      </ul>
    </div>
  </nav>

  <main>
    <div class="container">

      <div class="search-hero">
        <h1>Search prints</h1>
        <div class="search-input-wrap">
          <input
            type="search"
            id="search-input"
            class="search-input"
            placeholder="Try: raven, futurism, winter, warrior, eagle…"
            autocomplete="off"
            autofocus
            aria-label="Search prints"
          >
          <button class="search-clear" id="search-clear" aria-label="Clear search">&#215;</button>
        </div>
        <p class="search-meta" id="search-meta" aria-live="polite"></p>
      </div>

      <div class="works-grid" id="search-results"></div>

      <div class="no-results" id="no-results" style="display:none;">
        <p>No prints matched <strong id="no-results-term"></strong>.</p>
        <p><a href="/prints/">Browse all prints</a> or try a different word.</p>
      </div>

    </div>
  </main>

  <footer class="site-footer">
    <div class="container">
      <div class="footer-inner">
        <p class="footer-copy">&copy; 2026 Tom Myer. All rights reserved.</p>
        <ul class="footer-nav" role="list">
          <li><a href="/">Home</a></li>
          <li><a href="/prints/">Prints</a></li>
          <li><a href="/about/">About</a></li>
          <li><a href="/patreon/">Patreon</a></li>
          <li><a href="https://linktr.ee/myerman" target="_blank" rel="noopener noreferrer">Contact</a></li>
        </ul>
      </div>
    </div>
  </footer>

  <script src="/js/cart.js"></script>
  <script>
    (function () {
      var data = [];
      var sold = { "ancestral-faces": true, "three-sachems": true, "uncle": true };

      var input     = document.getElementById("search-input");
      var clearBtn  = document.getElementById("search-clear");
      var meta      = document.getElementById("search-meta");
      var grid      = document.getElementById("search-results");
      var noResults = document.getElementById("no-results");
      var noTerm    = document.getElementById("no-results-term");

      // Load the index
      fetch("/search.json")
        .then(function (r) { return r.json(); })
        .then(function (json) {
          data = json;
          // If page loaded with ?q= in URL, run immediately
          var params = new URLSearchParams(window.location.search);
          var q = params.get("q") || "";
          if (q) {
            input.value = q;
            run(q);
          } else {
            meta.textContent = data.length + " prints in the catalog.";
          }
        });

      input.addEventListener("input", function () {
        var q = input.value.trim();
        clearBtn.style.display = q ? "block" : "none";
        // Update URL without reloading
        var url = q ? ("?q=" + encodeURIComponent(q)) : window.location.pathname;
        history.replaceState(null, "", url);
        run(q);
      });

      clearBtn.addEventListener("click", function () {
        input.value = "";
        clearBtn.style.display = "none";
        history.replaceState(null, "", window.location.pathname);
        run("");
        input.focus();
      });

      function run(q) {
        grid.innerHTML = "";
        noResults.style.display = "none";

        if (!q) {
          meta.textContent = data.length + " prints in the catalog.";
          return;
        }

        // Split query into words, match any
        var terms = q.toLowerCase().split(/\s+/).filter(Boolean);
        var results = data.filter(function (p) {
          var haystack = [p.title, p.story].concat(p.tags).join(" ").toLowerCase();
          return terms.every(function (t) { return haystack.indexOf(t) !== -1; });
        });

        if (results.length === 0) {
          noResults.style.display = "block";
          noTerm.textContent = "\u201C" + q + "\u201D";
          meta.textContent = "";
          return;
        }

        var word = results.length === 1 ? "print" : "prints";
        meta.innerHTML = "<strong>" + results.length + "</strong> " + word + " matched \u201C" + q + "\u201D";

        results.forEach(function (p) {
          var label = sold[p.slug] ? "Sold" : "Buy print &#8594;";
          grid.innerHTML +=
            '<a href="/prints/' + p.slug + '/" class="work-card">' +
              '<div class="work-card-image">' +
                '<img src="/prints/' + p.slug + '/' + p.slug + '-thumb.jpg"' +
                ' alt="' + p.title + ' — digital artwork by Tom Myer"' +
                ' width="480" height="480" loading="lazy">' +
              '</div>' +
              '<div class="work-card-body">' +
                '<h3 class="work-card-title">' + p.title + '</h3>' +
                '<span class="work-card-link">' + label + '</span>' +
              '</div>' +
            '</a>';
        });
      }
    })();
  </script>

</body>
</html>
